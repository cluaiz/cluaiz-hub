name: Build Search Extension

on:
  push:
    branches:
      - main
    paths:
      - 'Extensions/cluaiz-search/**'
  pull_request:
    paths:
      - 'Extensions/cluaiz-search/**'
  workflow_dispatch:

jobs:
  build-extension:
    name: Build Native Extension
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          
      - name: Build Release Binary
        working-directory: Extensions/cluaiz-search
        run: cargo build --release

      - name: Upload Artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: cluaiz-search-windows
          path: Extensions/cluaiz-search/target/release/*.dll
          if-no-files-found: error

      - name: Upload Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: cluaiz-search-linux
          path: Extensions/cluaiz-search/target/release/*.so
          if-no-files-found: error

      - name: Upload Artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: cluaiz-search-macos
          path: Extensions/cluaiz-search/target/release/*.dylib
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build-extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: search-nightly
          name: cluaiz Search Extension (Nightly)
          body: "Automatically built native extension binaries for cluaiz Search."
          files: artifacts/*
